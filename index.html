<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Fonker Studio - Pro Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; user-select: none; }
        #toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
                   background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: flex; gap: 10px; z-index: 100;}
        .btn { padding: 10px; border: none; cursor: pointer; border-radius: 5px; color: white; font-weight: bold; }
        #info { position: absolute; top: 10px; left: 10px; color: white; z-index: 100; pointer-events: none;}
        #properties { 
            position: absolute; right: 20px; top: 20px; width: 200px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; 
            color: white; display: none; z-index: 101; border: 1px solid #555;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>Fonker Studio</h1>
        <p><b>LMB:</b> Тягнути блок | <b>RMB:</b> Меню блоку | <b>WASD:</b> Рух</p>
    </div>

    <div id="properties">
        <h3 style="margin-top:0">Студія Деталей</h3>
        <label>Колір: <input type="color" id="blockColorPicker"></label><br><br>
        <label><input type="checkbox" id="ghostCheck"> CanCollide (Привид)</label><br><br>
        <button class="btn" style="background: #ff4444; width: 100%;" onclick="deleteSelected()">Delete</button>
    </div>

    <div id="toolbar">
        <button class="btn" style="background: #44ff44;" onclick="window.currentMode='build'">Режим: БУДУВАТИ</button>
        <button class="btn" style="background: #4444ff;" onclick="window.currentMode='move'">Режим: РУХ</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
                       "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.PointLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.GridHelper(100, 100, 0x444444, 0x222222));

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({visible: false}));
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);
        
        const objects = [plane];
        let selectedObject = null;
        let draggedObject = null;

        const player = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
        player.position.set(0, 1, 0);
        scene.add(player);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minDistance = 0.1; 
        camera.position.set(0, 5, 10);

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.currentMode = 'build';
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // ОБРОБКА МИШІ
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                // ПРАВА КНОПКА - МЕНЮ
                if (e.button === 2 && intersect.object !== plane) {
                    selectedObject = intersect.object;
                    document.getElementById('properties').style.display = 'block';
                    document.getElementById('ghostCheck').checked = selectedObject.isGhost;
                    return;
                }

                // ЛІВА КНОПКА - БУДУВАТИ АБО ТЯГНУТИ
                if (e.button === 0) {
                    if (intersect.object !== plane) {
                        draggedObject = intersect.object;
                        controls.enabled = false; // Вимикаємо обертання камери поки тягнемо
                    } else if (window.currentMode === 'build') {
                        const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x44ff44 }));
                        cube.position.copy(intersect.point).add(intersect.face.normal.multiplyScalar(0.5)).floor().addScalar(0.5);
                        scene.add(cube);
                        objects.push(cube);
                    }
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!draggedObject) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersect = raycaster.intersectObject(plane);
            if (intersect) {
                draggedObject.position.copy(intersect.point).floor().addScalar(0.5);
                draggedObject.position.y = 0.5; // Тримаємо на землі
            }
        });

        window.addEventListener('mouseup', () => {
            draggedObject = null;
            controls.enabled = true;
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        window.deleteSelected = () => {
            if (selectedObject) {
                scene.remove(selectedObject);
                objects.splice(objects.indexOf(selectedObject), 1);
                document.getElementById('properties').style.display = 'none';
            }
        };

        document.getElementById('ghostCheck').addEventListener('change', (e) => {
            if (selectedObject) selectedObject.isGhost = e.target.checked;
        });

        let velocityY = 0;
        const gravity = -0.015;
        let isGrounded = false;

        function animate() {
            requestAnimationFrame(animate);

            // РУХ ГРАВЦЯ
            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;

            if (moveDir.length() > 0) {
                moveDir.normalize();
                const angle = Math.atan2(camera.position.x - player.position.x, camera.position.z - player.position.z);
                moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                player.position.addScaledVector(moveDir, 0.2);
            }

            // ФІЗИКА (Твердість)
            const ray = new THREE.Raycaster(player.position, new THREE.Vector3(0, -1, 0), 0, 1.1);
            const hits = ray.intersectObjects(objects.filter(o => o !== plane && !o.isGhost));
            
            if (hits.length > 0) {
                player.position.y = hits[0].object.position.y + 1;
                velocityY = 0;
                isGrounded = true;
            } else if (player.position.y <= 1) {
                player.position.y = 1;
                velocityY = 0;
                isGrounded = true;
            } else {
                isGrounded = false;
            }

            if (keys['Space'] && isGrounded) velocityY = 0.3;
            velocityY += gravity;
            player.position.y += velocityY;

            // КАМЕРА (Жорстке слідування за Roblox)
            const relativeCameraOffset = new THREE.Vector3(0, 5, 10);
            const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);
            
            controls.target.copy(player.position);
            controls.update();

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
