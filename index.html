<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Fonker Studio v3.1 - Pro Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; user-select: none; }
        #topbar { position: absolute; top: 0; width: 100%; background: #222; padding: 10px; display: flex; justify-content: center; gap: 15px; z-index: 100; border-bottom: 2px solid #444; }
        #properties { position: absolute; right: 20px; top: 70px; width: 220px; background: rgba(30,30,30,0.95); padding: 15px; border-radius: 8px; color: white; display: none; z-index: 101; border: 1px solid #555; }
        .btn { padding: 8px 15px; border: none; cursor: pointer; border-radius: 4px; color: white; font-weight: bold; }
        .ui-element { transition: opacity 0.3s; }
        .hidden { opacity: 0; pointer-events: none; }
        h4 { margin: 0 0 10px 0; color: #00f2ff; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .setting { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="topbar" class="ui-element">
        <button id="playBtn" class="btn" style="background: #28a745;" onclick="togglePlay()">▶ PLAY</button>
        <button class="btn" style="background: #444;" onclick="setShape('box')">Block</button>
        <button class="btn" style="background: #444;" onclick="setShape('sphere')">Ball</button>
    </div>

    <div id="properties" class="ui-element">
        <h4>Object Editor</h4>
        <div class="setting">
            <span>Color:</span>
            <input type="color" id="colorPicker">
        </div>
        <div class="setting">
            <span>Anchored:</span>
            <input type="checkbox" id="freezeCheck">
        </div>
        <div class="setting">
            <span>CanCollide:</span>
            <input type="checkbox" id="collideCheck">
        </div>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <button class="btn" style="background:#dc3545; width:100%" onclick="deleteObj()">Delete Part</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
                       "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        
        const grid = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
        scene.add(grid);

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({visible: false}));
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);
        
        const objects = [plane];
        let isPlaying = false;
        let selectedObject = null;
        window.currentShape = 'box';

        const player = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
        player.visible = false;
        scene.add(player);

        const controls = new OrbitControls(camera, renderer.domElement);
        const transform = new TransformControls(camera, renderer.domElement);
        transform.setMode('scale');
        scene.add(transform);

        transform.addEventListener('dragging-changed', (e) => controls.enabled = !e.value);

        window.togglePlay = () => {
            isPlaying = !isPlaying;
            document.getElementById('properties').classList.toggle('hidden', isPlaying);
            document.getElementById('playBtn').innerText = isPlaying ? "■ STOP" : "▶ PLAY";
            document.getElementById('playBtn').style.background = isPlaying ? "#dc3545" : "#28a745";
            
            grid.visible = !isPlaying;
            player.visible = isPlaying;
            transform.detach();
            
            if (isPlaying) {
                player.position.set(0, 5, 0);
                velocityY = 0;
            }
        };

        window.setShape = s => window.currentShape = s;
        window.deleteObj = () => { if(selectedObject) { scene.remove(selectedObject); objects.splice(objects.indexOf(selectedObject), 1); transform.detach(); document.getElementById('properties').style.display = 'none'; } };

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            if (isPlaying || e.target.closest('button') || e.target.closest('#properties')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (intersect.object !== plane) {
                    selectedObject = intersect.object;
                    transform.attach(selectedObject);
                    document.getElementById('properties').style.display = 'block';
                    document.getElementById('freezeCheck').checked = selectedObject.anchored;
                    document.getElementById('collideCheck').checked = selectedObject.canCollide;
                } else {
                    const geo = window.currentShape === 'box' ? new THREE.BoxGeometry(1, 1, 1) : new THREE.SphereGeometry(0.6);
                    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x44ff44 }));
                    mesh.position.copy(intersect.point).add(intersect.face.normal.multiplyScalar(0.5)).floor().addScalar(0.5);
                    mesh.anchored = true;
                    mesh.canCollide = true;
                    scene.add(mesh);
                    objects.push(mesh);
                }
            } else {
                transform.detach();
                document.getElementById('properties').style.display = 'none';
            }
        });

        document.getElementById('colorPicker').oninput = (e) => { if(selectedObject) selectedObject.material.color.set(e.target.value); };
        document.getElementById('freezeCheck').onchange = (e) => { if(selectedObject) selectedObject.anchored = e.target.checked; };
        document.getElementById('collideCheck').onchange = (e) => { 
            if(selectedObject) {
                selectedObject.canCollide = e.target.checked;
                selectedObject.material.transparent = !selectedObject.canCollide;
                selectedObject.material.opacity = selectedObject.canCollide ? 1 : 0.5;
            }
        };

        let velocityY = 0;
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                const moveDir = new THREE.Vector3();
                if (keys['KeyW']) moveDir.z -= 1;
                if (keys['KeyS']) moveDir.z += 1;
                if (keys['KeyA']) moveDir.x -= 1;
                if (keys['KeyD']) moveDir.x += 1;

                if (moveDir.length() > 0) {
                    moveDir.normalize();
                    const angle = Math.atan2(camera.position.x - player.position.x, camera.position.z - player.position.z);
                    moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                    player.position.addScaledVector(moveDir, 0.2);
                }

                // Справжня фізика
                const ray = new THREE.Raycaster(player.position, new THREE.Vector3(0, -1, 0), 0, 1.1);
                const hits = ray.intersectObjects(objects.filter(o => o !== plane && o.canCollide));
                let grounded = player.position.y <= 1;
                
                if (hits.length > 0) { 
                    player.position.y = hits[0].point.y + 1; 
                    velocityY = 0; grounded = true; 
                } else if (grounded) { 
                    player.position.y = 1; velocityY = 0; 
                }
                
                if (keys['Space'] && grounded) velocityY = 0.3;
                if (!grounded) velocityY -= 0.015;
                player.position.y += velocityY;
                controls.target.lerp(player.position, 0.1);
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
