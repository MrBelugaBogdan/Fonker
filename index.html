<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Fonker Pro 2.2 - Camera Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; user-select: none; }
        #toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
                   background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: flex; gap: 10px; z-index: 100;}
        .btn { padding: 10px; border: none; cursor: pointer; border-radius: 5px; color: white; font-weight: bold; }
        #info { position: absolute; top: 10px; left: 10px; color: white; z-index: 100; pointer-events: none;}
    </style>
</head>
<body>
    <div id="info">
        <h1>Fonker Pro 2.2</h1>
        <p><b>WASD:</b> Рух | <b>Space:</b> Стрибок | <b>ПКМ:</b> Камера (Zoom limited) | <b>Shift+Клік:</b> Видалити</p>
    </div>

    <div id="toolbar">
        <button class="btn" style="background: #ff4444;" onclick="window.currentColor=0xff4444">Червоний</button>
        <button class="btn" style="background: #44ff44;" onclick="window.currentColor=0x44ff44">Зелений</button>
        <button class="btn" style="background: #4444ff;" onclick="window.currentColor=0x4444ff">Синій</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
                       "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(10, 20, 10);
        scene.add(light);
        
        scene.add(new THREE.GridHelper(100, 100, 0x555555, 0x333333));

        const planeGeo = new THREE.PlaneGeometry(200, 200);
        const plane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({visible: false}));
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);
        
        const objects = [plane];

        const player = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
        player.position.y = 1;
        scene.add(player);

        // --- НАЛАШТУВАННЯ КАМЕРИ ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.minDistance = 2;   // Не підходити ближче ніж на 2 метри
        controls.maxDistance = 40;  // Не відлітати далі ніж на 40 метрів
        controls.enableDamping = true;
        camera.position.set(0, 10, 15);
        
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.currentColor = 0x44ff44;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let velocityY = 0;
        const gravity = -0.012;
        let isGrounded = true;

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || e.target.tagName === 'BUTTON') return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const intersect = intersects[0];
                
                // Фікс багу: якщо клік занадто близько до камери - ігноруємо
                if (intersect.distance < 1) return;

                if (e.shiftKey) {
                    if (intersect.object !== plane) {
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                    }
                } else {
                    const cube = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1), 
                        new THREE.MeshStandardMaterial({ color: window.currentColor })
                    );
                    // Точне позиціонування
                    cube.position.copy(intersect.point).add(intersect.face.normal.multiplyScalar(0.5));
                    cube.position.divideScalar(1).floor().addScalar(0.5); 
                    
                    scene.add(cube);
                    objects.push(cube);
                }
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            const direction = new THREE.Vector3();
            if (keys['KeyW']) direction.z -= 1;
            if (keys['KeyS']) direction.z += 1;
            if (keys['KeyA']) direction.x -= 1;
            if (keys['KeyD']) direction.x += 1;

            if (direction.length() > 0) {
                direction.normalize();
                const angle = Math.atan2(camera.position.x - player.position.x, camera.position.z - player.position.z);
                direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                player.position.addScaledVector(direction, 0.18); // Швидкість трохи вища
            }

            if (keys['Space'] && isGrounded) {
                velocityY = 0.28;
                isGrounded = false;
            }
            velocityY += gravity;
            player.position.y += velocityY;

            if (player.position.y <= 1) {
                player.position.y = 1;
                velocityY = 0;
                isGrounded = true;
            }

            controls.target.lerp(player.position, 0.2); // Плавне слідування камери
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
